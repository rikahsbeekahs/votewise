<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoteWise | AI Guide</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-mark"><img src="icon.png" alt="Logo" style="width:100%; height:100%; border-radius:8px;"></div>
            <div>
                <span class="logo-name">VoteWise</span>
                <span class="logo-sub">AI GUIDE</span>
            </div>
        </div>
        <nav class="nav">
            <button class="nav-btn active" data-page="dashboard"><i data-lucide="home"></i><span>Dashboard</span></button>
            <button class="nav-btn" data-page="assistant"><i data-lucide="message-square"></i><span>Assistant</span></button>
            <button class="nav-btn" data-page="timeline"><i data-lucide="calendar"></i><span>Election Calendar</span></button>
            <button class="nav-btn" data-page="readiness"><i data-lucide="check-circle"></i><span>Readiness</span></button>
            <button class="nav-btn" data-page="quiz"><i data-lucide="award"></i><span>Quiz</span></button>
            <button class="nav-btn" data-page="mythbuster"><i data-lucide="shield-alert"></i><span>Myth Buster</span></button>
        </nav>
        <div class="sidebar-footer">
            <p class="resources-label">RESOURCES</p>
            <a href="https://voters.eci.gov.in" target="_blank" class="resource-link">
                <i data-lucide="info"></i><span>Official Voter Info</span>
            </a>
            <div class="dev-credit">
                <p class="resources-label" style="margin-top:1rem">DEVELOPED BY</p>
                <div class="dev-name">Shakeeb Shakir</div>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <div class="main-wrapper">
        <header class="top-bar">
            <div>
                <h1 id="page-title">Welcome to VoteWise</h1>
                <p id="page-subtitle">Empowering informed participation.</p>
            </div>
            <div class="live-badge"><span class="live-dot"></span>Live Updates Active</div>
        </header>
        <main class="page-content" id="page-content"></main>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
